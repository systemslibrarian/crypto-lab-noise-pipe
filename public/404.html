<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>crypto-lab-noise-pipe</title>
  <script>
    // SPA redirect for GitHub Pages
    const path = window.location.pathname;
    const base = '/crypto-lab-noise-pipe/';
    if (path !== base && path !== base + 'index.html') {
      window.location.replace(base + '#' + path.slice(base.length));
    } else {
      window.location.replace(base);
    }
  </script>
</head>
